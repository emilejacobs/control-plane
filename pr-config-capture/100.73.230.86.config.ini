# Instructions:
# https://guides.platerecognizer.com/docs/stream/getting-started

# Timezone configuration: https://guides.platerecognizer.com/docs/stream/configuration#timezone
timezone = UTC

[cameras]
  # Full list of regions: https://guides.platerecognizer.com/docs/snapshot/api-reference/#countries
  # regions = fr, gb

  # Sample 1 out of X frames. A high number will result in less compute.
  # A low number is preferred for a stream with fast moving vehicles
  # sample = 2

  # Maximum delay in seconds before a prediction is returned
  # max_prediction_delay = 6

  # Maximum time in seconds that a result stays in memory
  # memory_decay = 300

  # Enable make, model and color prediction. Your account must have that option.
  # mmc = true

  # Estimate vehicle's speed: https://guides.platerecognizer.com/docs/stream/configuration#speed
  # speed = true

  # Image file name: https://guides.platerecognizer.com/docs/stream/configuration#image_format
  image_format = $(camera)_screenshots/%y-%m-%d/%H-%M-%S.%f.jpg

  # Video file name: https://guides.platerecognizer.com/docs/stream/configuration#video_format
  # video_format = $(camera)_videos/%y-%m-%d/%H-%M-%S.%f.mp4

  # - To save video frames at maximum fps, set video_fps to native.
  # - Setting it to sample will save frames at a sample parameter rate.
  # video_fps = native

  # Only accept the results that exactly match the templates of the specified regions.
  # region_config = strict

  # How license plates are detected. Defaults to strict, so license plates detected outside a vehicle will be discarded. Set to normal if you want to include license plates outside of a vehicle.
  # detection_rule = strict

  # To capture vehicles without plates, set value to vehicle. By default, it is set to plate so only vehicles with a visible license plate get detected.
  # detection_mode = plate

  # Turns on/off reporting of vehicle's dwelling time.
  # dwell_time=no

  # Turns on/off reporting of vehicle's full trajectory (dwell_time must be on for this to work).
  # trajectory=no

  # Maximum time in seconds Stream waits after a vehicle has left, before reporting its time.
  # max_dwell_delay=15

  [[camera-1]]
    active = yes
    url = rtsp://platerec:8S5AZ7YasGc3m4@video.platerecognizer.com:8554/demo

    # Output methods. Uncomment/comment line to enable/disable.
    # - Save to CSV file. The corresponding frame is stored as an image in the same directory.
    csv_file = $(camera)_%y-%m-%d.csv

    # - Send to Webhook. The recognition data and vehicle image are encoded in
    # - multipart/form-data and sent to webhook_target.
    # webhook_targets = my-webhook-1, parkpow

    # - Send to ParkPow. See https://app.parkpow.com/accounts/token/
    # - Save to file in JSONLines format. https://jsonlines.org/
    # jsonlines_file = $(camera)_%y-%m-%d.jsonl

# Webhook targets and their parameters
[webhooks]
  caching = yes

  [[my-webhook-1]]
    url = http://my-webhook-1.site
    # - Webhook video type. Use "file" to send the video clip,
    # - "url" to send the video URL, "no" to not send any video information.
    video = no
    # - Webhook image type. Use "vehicle" to send the vehicle image,
    # - "original" to send the full-size image,
    # - "plate" to send licence plate.
    # - Use "no" or leave empty to not send an image.
    image = vehicle
    # - When a webhook is sent, the request will time out after n seconds and retry later.
    request_timeout = 30

  [[parkpow]]
    url = https://app.parkpow.com/api/v1/webhook-receiver/
    # Get your token here: https://app.parkpow.com/accounts/token/
    header = Authorization: Token my-unique-token
    image = vehicle
    request_timeout = 20
    caching = no

