timezone = UTC
config_change_restart = yes
[cameras]
    regions = us-az
    sample = 2
    max_prediction_delay = 2.0
    memory_decay = 300.0
    mmc = yes
    image_format = $(camera)_screenshots/%y-%m-%d/%H-%M-%S.%f.jpg
    video_fps = native
    video_before = 5.0
    video_after = 5.0
    region_config = normal
    detection_rule = normal
    detection_mode = plate
    dwell_time = yes
    trajectory = no
    max_dwell_delay = 4.0
    max_reconnection_delay = 600.0
    webhook_targets = prod, pre-prod
    report_static = no
    [[7_1]]
        url = rtsp://admin:Uknomi007@192.168.54.234:554/cam/realmonitor?channel=1&subtype=0
        active = yes
[webhooks]
    [[prod]]
        url = https://api-flask.uknomi.com/recognize_vehicle_event
        name = prod
        image = yes
        video = no
        header = MAC: 1cf64c52e376
        caching = no
        request_timeout = 30.0
        image_quality = 80
        image_type = plate
    [[pre-prod]]
        url = https://preprod-flask.uknomi.com/recognize_vehicle_event
        name = pre-prod
        image = yes
        video = no
        header = MAC: 1cf64c52e376
        caching = no
        request_timeout = 30.0
        image_quality = 80
        image_type = plate
