name: Build & push container images

# On every merge to main, build the three CP container images and push them
# to ECR. CI auths to AWS via the OIDC role provisioned in terraform-deploy
# (uknomi-gha-image-publish) so no long-lived AWS keys live in GitHub.
#
# Tags pushed:
#   - <git-sha>   — the immutable, deploy-ready tag.
#   - latest      — convenience pointer for the operator's terraform apply
#                   workflow until the auto-deploy slice replaces it.
#
# Fargate task defs default to X86_64; images build linux/amd64. The matrix
# fans out one job per service so a failure in one image's build does not
# block the others.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for the OIDC AssumeRoleWithWebIdentity
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "523612763411"
  OIDC_ROLE_ARN: arn:aws:iam::523612763411:role/uknomi-gha-image-publish

jobs:
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: cp-api
            context: .
            dockerfile: cmd/cp-api/Dockerfile
            build_args: ""
          - name: cp-ingest
            context: .
            dockerfile: cmd/cp-ingest/Dockerfile
            build_args: ""
          - name: dashboard
            context: web
            dockerfile: web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.control.uknomi.com
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/uknomi/${{ matrix.service.name }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/uknomi/${{ matrix.service.name }}:latest
          build-args: ${{ matrix.service.build_args }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
