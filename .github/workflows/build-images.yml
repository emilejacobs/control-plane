name: Build, push & deploy

# On every merge to main, build whichever of the CP container images were
# affected by the change, push them to ECR, and roll the corresponding
# ECS service. Path filters (per ADR-027) keep deploy churn proportional
# to the diff: a web/** change rolls only the dashboard; a shared
# internal/** change rolls all three Go services.
#
# Gate semantics (issue #11). The set of affected services is computed ONCE
# in the `changes` job, which emits dynamic matrix lists (build_services /
# deploy_services). The build and deploy jobs fan out over those lists, so an
# unaffected service produces NO job at all — it shows as absent, never as a
# green "success" that did nothing. Two further guards close the
# false-success holes #11 documented:
#   - deploy uses `if: !cancelled()` (not the implicit skip-on-needs-failure),
#     so one service's build failure no longer skips the deploy of a DIFFERENT
#     service whose build succeeded.
#   - before rolling, each deploy leg verifies its <sha> image is actually in
#     ECR; if its own build failed, the leg fails loudly instead of
#     force-redeploying the stale :latest and reporting a green roll.
# See the "verify the gate" procedure in ADR-027 § Verification.
#
# CI auths to AWS via the OIDC role provisioned in terraform-deploy
# (uknomi-gha-image-publish; widened by ADR-027 to grant ecs:UpdateService
# + RunTask + PassRole on top of the original ECR push permissions).
#
# Tags pushed:
#   - <git-sha>   — the immutable, deploy-ready tag.
#   - latest      — what the Terraform-managed task defs reference. The
#                   service rollout below is what makes a fresh :latest
#                   actually run; without it the new image only ships on
#                   the next task replacement.
#
# Fargate task defs default to X86_64; images build linux/amd64.
#
# Audit-mirror is a scheduled (00:05 UTC daily) one-shot task, not a
# long-running service. On an image change we kick a fresh run-task so
# the new image is verified before the next scheduled run; failures
# surface through the existing audit-mirror-failure alarm.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC AssumeRoleWithWebIdentity
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "523612763411"
  OIDC_ROLE_ARN: arn:aws:iam::523612763411:role/uknomi-gha-image-publish
  ECS_CLUSTER: uknomi-cp
  AUDIT_MIRROR_RULE: uknomi-cp-audit-mirror-daily
  AUDIT_MIRROR_TASK_DEF: uknomi-cp-audit-mirror
  TAXONOMY_SYNC_RULE: uknomi-cp-taxonomy-sync-daily
  TAXONOMY_SYNC_TASK_DEF: uknomi-cp-taxonomy-sync

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Decide which services the diff actually affects. The Go services share
  # a lot of code under internal/cp/**; the filters are conservative —
  # when in doubt, redeploy. Filter mapping rationale:
  #
  #   - dashboard depends only on web/**.
  #   - Each cmd/<svc>/** dir is service-specific.
  #   - The internal/cp/<pkg>/** dirs are split into service-specific
  #     (api/authn/authz/bootstrap/iotprovisioner → cp-api;
  #     ingest/presence/sqsconsumer → cp-ingest;
  #     auditmirror → audit-mirror) and shared (storage/cplog/audit/
  #     registry, plus go.mod/go.sum and the cmd/agent shared transport).
  #   - workflow_dispatch always builds + deploys everything (filter
  #     outputs default to false on dispatch, so we OR them with a
  #     dispatch override below).
  #
  # Emits both the per-service booleans (consumed by the scheduled run-task
  # jobs) and two dynamic matrix lists: build_services (every affected image)
  # and deploy_services (the affected long-running services only). Fanning the
  # build/deploy jobs over those lists is what makes an unaffected service
  # ABSENT from the run rather than a green no-op (issue #11).
  changes:
    name: Detect affected services
    runs-on: ubuntu-latest
    outputs:
      # Hyphenated GHA expression keys require bracket access, not dot.
      cp-api:         ${{ steps.combine.outputs['cp-api'] }}
      cp-ingest:      ${{ steps.combine.outputs['cp-ingest'] }}
      dashboard:      ${{ steps.combine.outputs['dashboard'] }}
      audit-mirror:   ${{ steps.combine.outputs['audit-mirror'] }}
      taxonomy-sync:  ${{ steps.combine.outputs['taxonomy-sync'] }}
      build_services:  ${{ steps.combine.outputs.build_services }}
      deploy_services: ${{ steps.combine.outputs.deploy_services }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        # Each go-* filter inlines the shared-Go-code patterns rather
        # than using YAML anchors — anchor-in-list flattening is
        # parser-dependent and not worth the risk for ~20 lines.
        # If you add a new shared internal/cp/<pkg>, add it to every go-*
        # filter below. Service-specific packages stay in their one
        # filter. The dashboard filter is intentionally narrow: a Go
        # change does not rebuild the Next.js bundle.
        with:
          filters: |
            cp-api:
              - 'go.mod'
              - 'go.sum'
              - 'internal/cp/storage/**'
              - 'internal/cp/cplog/**'
              - 'internal/cp/audit/**'
              - 'internal/cp/registry/**'
              - 'internal/protocol/**'
              - 'internal/service/**'
              - 'internal/envelope/**'
              - 'cmd/cp-api/**'
              - 'internal/cp/api/**'
              - 'internal/cp/authn/**'
              - 'internal/cp/authz/**'
              - 'internal/cp/bootstrap/**'
              - 'internal/cp/iotprovisioner/**'
              - 'internal/cp/iotpublisher/**'
              - 'internal/cp/taxonomy/**'
            cp-ingest:
              - 'go.mod'
              - 'go.sum'
              - 'internal/cp/storage/**'
              - 'internal/cp/cplog/**'
              - 'internal/cp/audit/**'
              - 'internal/cp/registry/**'
              - 'internal/protocol/**'
              - 'internal/service/**'
              - 'internal/envelope/**'
              - 'cmd/cp-ingest/**'
              - 'internal/cp/ingest/**'
              - 'internal/cp/notify/**'
              - 'internal/cp/presence/**'
              - 'internal/cp/sqsconsumer/**'
            audit-mirror:
              - 'go.mod'
              - 'go.sum'
              - 'internal/cp/storage/**'
              - 'internal/cp/cplog/**'
              - 'internal/cp/audit/**'
              - 'internal/cp/registry/**'
              - 'internal/protocol/**'
              - 'internal/service/**'
              - 'cmd/audit-mirror/**'
              - 'internal/cp/auditmirror/**'
            taxonomy-sync:
              - 'go.mod'
              - 'go.sum'
              - 'internal/cp/storage/**'
              - 'internal/cp/cplog/**'
              - 'cmd/taxonomy-sync/**'
              - 'internal/cp/taxonomy/**'
            dashboard:
              - 'web/**'

      - id: combine
        env:
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          F_CP_API: ${{ steps.filter.outputs['cp-api'] }}
          F_CP_INGEST: ${{ steps.filter.outputs['cp-ingest'] }}
          F_AUDIT_MIRROR: ${{ steps.filter.outputs['audit-mirror'] }}
          F_TAXONOMY_SYNC: ${{ steps.filter.outputs['taxonomy-sync'] }}
          F_DASHBOARD: ${{ steps.filter.outputs['dashboard'] }}
        run: |
          set -euo pipefail
          # workflow_dispatch forces every service true; otherwise honor the
          # path filter. Plain vars (no associative arrays) keep this portable.
          val() {
            if [[ "$DISPATCH" == "true" || "$1" == "true" ]]; then echo true; else echo false; fi
          }
          V_CP_API="$(val "$F_CP_API")"
          V_CP_INGEST="$(val "$F_CP_INGEST")"
          V_AUDIT_MIRROR="$(val "$F_AUDIT_MIRROR")"
          V_TAXONOMY_SYNC="$(val "$F_TAXONOMY_SYNC")"
          V_DASHBOARD="$(val "$F_DASHBOARD")"
          {
            echo "cp-api=$V_CP_API"
            echo "cp-ingest=$V_CP_INGEST"
            echo "audit-mirror=$V_AUDIT_MIRROR"
            echo "taxonomy-sync=$V_TAXONOMY_SYNC"
            echo "dashboard=$V_DASHBOARD"
          } >> "$GITHUB_OUTPUT"

          # Dynamic matrix lists. build covers every affected image; deploy
          # covers only the long-running services rolled via update-service
          # (audit-mirror / taxonomy-sync are scheduled run-task jobs below).
          build_services='[]'
          deploy_services='[]'
          add_build()  { if [[ "$1" == "true" ]]; then build_services="$(jq -c --arg s "$2" '. + [$s]' <<<"$build_services")"; fi; }
          add_deploy() { if [[ "$1" == "true" ]]; then deploy_services="$(jq -c --arg s "$2" '. + [$s]' <<<"$deploy_services")"; fi; }
          add_build  "$V_CP_API"        cp-api
          add_build  "$V_CP_INGEST"     cp-ingest
          add_build  "$V_DASHBOARD"     dashboard
          add_build  "$V_AUDIT_MIRROR"  audit-mirror
          add_build  "$V_TAXONOMY_SYNC" taxonomy-sync
          add_deploy "$V_CP_API"        cp-api
          add_deploy "$V_CP_INGEST"     cp-ingest
          add_deploy "$V_DASHBOARD"     dashboard
          {
            echo "build_services=$build_services"
            echo "deploy_services=$deploy_services"
          } >> "$GITHUB_OUTPUT"
          echo "build_services=$build_services"
          echo "deploy_services=$deploy_services"

  # ─────────────────────────────────────────────────────────────────────────
  # Build + push only the affected images. The matrix is the dynamic
  # build_services list, so an unaffected service produces no build job at
  # all (rather than a skipped-step no-op that still reports success).
  # fail-fast: false keeps each service's build independent.
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.build_services != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.build_services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Resolve build context for ${{ matrix.service }}
        id: cfg
        # The per-service build inputs (Docker context / file / args) live
        # here rather than in a static matrix so the matrix itself can be the
        # dynamic affected-services list.
        run: |
          set -euo pipefail
          case "${{ matrix.service }}" in
            cp-api)        ctx="."   ; df="cmd/cp-api/Dockerfile"        ; ba="" ;;
            cp-ingest)     ctx="."   ; df="cmd/cp-ingest/Dockerfile"     ; ba="" ;;
            dashboard)     ctx="web" ; df="web/Dockerfile"              ; ba="NEXT_PUBLIC_API_URL=https://api.control.uknomi.com" ;;
            audit-mirror)  ctx="."   ; df="cmd/audit-mirror/Dockerfile"  ; ba="" ;;
            taxonomy-sync) ctx="."   ; df="cmd/taxonomy-sync/Dockerfile" ; ba="" ;;
            *) echo "::error::unknown service ${{ matrix.service }}"; exit 1 ;;
          esac
          {
            echo "context=$ctx"
            echo "dockerfile=$df"
            echo "build_args=$ba"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.cfg.outputs.context }}
          file: ${{ steps.cfg.outputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/uknomi/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/uknomi/${{ matrix.service }}:latest
          build-args: ${{ steps.cfg.outputs.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Roll each long-running ECS service whose image was rebuilt. The matrix is
  # the dynamic deploy_services list. `if: !cancelled()` means a build failure
  # in a DIFFERENT service no longer skips this job (issue #11 AC2); the
  # per-leg image check then refuses to roll a service whose OWN build failed.
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: ${{ !cancelled() && needs.changes.outputs.deploy_services != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.deploy_services) }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ${{ matrix.service }} image was published
        # This service is affected, so its build was expected to push
        # uknomi/<svc>:<sha>. If it is absent the build failed (the deploy job
        # runs anyway under !cancelled()): fail loudly here instead of
        # force-redeploying the stale :latest and reporting a green roll that
        # shipped nothing new (issue #11).
        run: |
          set -euo pipefail
          found="$(aws ecr batch-get-image \
            --repository-name "uknomi/${{ matrix.service }}" \
            --image-ids imageTag=${{ github.sha }} \
            --query 'length(images)' --output text)"
          if [ "$found" = "0" ]; then
            echo "::error::uknomi/${{ matrix.service }}:${{ github.sha }} is not in ECR — its build did not publish this commit. Refusing to roll the stale :latest."
            exit 1
          fi
          echo "::notice::uknomi/${{ matrix.service }}:${{ github.sha }} present in ECR; rolling."

      - name: Force-redeploy ${{ matrix.service }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "${{ matrix.service }}" \
            --force-new-deployment \
            --query 'service.{name:serviceName,desired:desiredCount,deploymentId:deployments[0].id}' \
            --output table

      - name: Wait for ${{ matrix.service }} to stabilize
        # services-stable polls every 15s for up to 10 minutes by default.
        # ECS's deployment circuit-breaker will roll back internally if
        # the new task fails health checks; this step then fails because
        # the service is not at the new deployment yet.
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "${{ matrix.service }}"
          echo "::notice::${{ matrix.service }} stable on new task set"

  # ─────────────────────────────────────────────────────────────────────────
  # Audit-mirror is a one-shot scheduled task, not a long-running service.
  # On an image change, kick a fresh run-task so the new image is
  # exercised immediately rather than waiting until the next 00:05 UTC
  # scheduled run. `if: !cancelled()` decouples it from an unrelated
  # service's build failure (issue #11); the image check guards against
  # smoke-running a stale image when audit-mirror's OWN build failed.
  # Otherwise fire-and-forget — the existing
  # `uknomi-cp-audit-mirror-failure` log-metric alarm catches a non-zero
  # exit, so blocking the workflow on task completion would only add
  # cycle-time cost.
  audit-mirror-run:
    name: Smoke-run audit-mirror
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: ${{ !cancelled() && needs.changes.outputs['audit-mirror'] == 'true' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify audit-mirror image was published
        run: |
          set -euo pipefail
          found="$(aws ecr batch-get-image \
            --repository-name "uknomi/audit-mirror" \
            --image-ids imageTag=${{ github.sha }} \
            --query 'length(images)' --output text)"
          if [ "$found" = "0" ]; then
            echo "::error::uknomi/audit-mirror:${{ github.sha }} is not in ECR — its build did not publish this commit; skipping the smoke run."
            exit 1
          fi

      - name: Derive network config from the EventBridge target
        id: netconf
        # Re-use the network configuration that EventBridge already passes
        # to the scheduled run (subnets + tasks SG). This avoids hardcoding
        # subnet/SG IDs into the workflow and stays in sync if the
        # underlying VPC layout changes.
        #
        # NOTE: `aws events list-targets-by-rule` returns the awsvpc block
        # in EventBridge's PascalCase shape (Subnets, SecurityGroups,
        # AssignPublicIp), but `aws ecs run-task --network-configuration`
        # only accepts the camelCase shape (subnets, securityGroups,
        # assignPublicIp). Translate explicitly rather than passing the
        # PascalCase blob through and getting a ParamValidation error.
        run: |
          set -euo pipefail
          awsvpc_json="$(
            aws events list-targets-by-rule \
              --rule "$AUDIT_MIRROR_RULE" \
              --query 'Targets[0].EcsParameters.NetworkConfiguration.awsvpcConfiguration' \
              --output json
          )"
          netconf="$(jq -cn --argjson c "$awsvpc_json" '{
            awsvpcConfiguration: {
              subnets:        $c.Subnets,
              securityGroups: $c.SecurityGroups,
              assignPublicIp: $c.AssignPublicIp
            }
          }')"
          echo "netconf=$netconf" >> "$GITHUB_OUTPUT"

      - name: Run audit-mirror task
        env:
          NETCONF: ${{ steps.netconf.outputs.netconf }}
        run: |
          set -euo pipefail
          task_arn="$(
            aws ecs run-task \
              --cluster "$ECS_CLUSTER" \
              --launch-type FARGATE \
              --task-definition "$AUDIT_MIRROR_TASK_DEF" \
              --network-configuration "$NETCONF" \
              --started-by "gha-build-images-${GITHUB_RUN_ID}" \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          echo "::notice::Started audit-mirror task ${task_arn}"
          echo "Failures surface through the uknomi-cp-audit-mirror-failure CloudWatch alarm."

  # ─────────────────────────────────────────────────────────────────────────
  # Same shape as audit-mirror-run: taxonomy-sync is scheduled daily but
  # exercise the freshly-built image immediately on push. Failures bubble
  # through the uknomi-cp-taxonomy-sync-failure log-metric alarm.
  taxonomy-sync-run:
    name: Smoke-run taxonomy-sync
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: ${{ !cancelled() && needs.changes.outputs['taxonomy-sync'] == 'true' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify taxonomy-sync image was published
        run: |
          set -euo pipefail
          found="$(aws ecr batch-get-image \
            --repository-name "uknomi/taxonomy-sync" \
            --image-ids imageTag=${{ github.sha }} \
            --query 'length(images)' --output text)"
          if [ "$found" = "0" ]; then
            echo "::error::uknomi/taxonomy-sync:${{ github.sha }} is not in ECR — its build did not publish this commit; skipping the smoke run."
            exit 1
          fi

      - name: Derive network config from the EventBridge target
        id: netconf
        # Same PascalCase → camelCase translation as audit-mirror.
        run: |
          set -euo pipefail
          awsvpc_json="$(
            aws events list-targets-by-rule \
              --rule "$TAXONOMY_SYNC_RULE" \
              --query 'Targets[0].EcsParameters.NetworkConfiguration.awsvpcConfiguration' \
              --output json
          )"
          netconf="$(jq -cn --argjson c "$awsvpc_json" '{
            awsvpcConfiguration: {
              subnets:        $c.Subnets,
              securityGroups: $c.SecurityGroups,
              assignPublicIp: $c.AssignPublicIp
            }
          }')"
          echo "netconf=$netconf" >> "$GITHUB_OUTPUT"

      - name: Run taxonomy-sync task
        env:
          NETCONF: ${{ steps.netconf.outputs.netconf }}
        run: |
          set -euo pipefail
          task_arn="$(
            aws ecs run-task \
              --cluster "$ECS_CLUSTER" \
              --launch-type FARGATE \
              --task-definition "$TAXONOMY_SYNC_TASK_DEF" \
              --network-configuration "$NETCONF" \
              --started-by "gha-build-images-${GITHUB_RUN_ID}" \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          echo "::notice::Started taxonomy-sync task ${task_arn}"
          echo "Failures surface through the uknomi-cp-taxonomy-sync-failure CloudWatch alarm."
