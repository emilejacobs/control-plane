name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: Shellcheck (install-cp-agent.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint scripts/install-cp-agent.sh
        run: shellcheck --severity=warning scripts/install-cp-agent.sh

  test-and-build:
    name: Test & Build (${{ matrix.target.goos }}/${{ matrix.target.goarch }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: darwin, goarch: arm64, runner: macos-latest }
          - { goos: darwin, goarch: amd64, runner: macos-latest }
          - { goos: linux, goarch: arm64, runner: ubuntu-latest }
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Cross-build agent
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          go build -o bin/agent-${GOOS}-${GOARCH} ./cmd/agent
          go build -o bin/agent-cli-${GOOS}-${GOARCH} ./cmd/agent-cli

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: bin/
          if-no-files-found: error
          retention-days: 14
